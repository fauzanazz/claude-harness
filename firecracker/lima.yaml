# Lima VM configuration for running Firecracker on macOS (Apple Silicon).
#
# Usage:
#   limactl create --name fc firecracker/lima.yaml
#   limactl start fc
#   limactl shell fc
#
# Inside the Lima VM, Firecracker can use /dev/kvm directly.

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

cpus: 4
memory: "4GiB"
disk: "20GiB"

# Enable nested virtualization (KVM inside Lima's QEMU VM)
nestedVirtualization: true

mounts:
  - location: "~"
    writable: true

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # Install Firecracker
      FC_VERSION="1.11.0"
      FC_ARCH="aarch64"
      curl -fsSL "https://github.com/firecracker-microvm/firecracker/releases/download/v${FC_VERSION}/firecracker-v${FC_VERSION}-${FC_ARCH}.tgz" \
        | tar -xz -C /usr/local/bin --strip-components=1 \
          "release-v${FC_VERSION}-${FC_ARCH}/firecracker-v${FC_VERSION}-${FC_ARCH}" \
          "release-v${FC_VERSION}-${FC_ARCH}/jailer-v${FC_VERSION}-${FC_ARCH}"
      ln -sf "/usr/local/bin/firecracker-v${FC_VERSION}-${FC_ARCH}" /usr/local/bin/firecracker
      ln -sf "/usr/local/bin/jailer-v${FC_VERSION}-${FC_ARCH}" /usr/local/bin/jailer

      # Ensure KVM is accessible
      chmod 666 /dev/kvm || true

      # Convenience symlink (repo is already mounted via ~ at its real path)
      ln -sfn /Users/enjat/Github/claude-harness /harness

      # Install build tools and Docker
      apt-get update -q
      apt-get install -yq --no-install-recommends \
        build-essential \
        musl-tools \
        python3 python3-pip python3-venv python3-httpx \
        docker.io \
        e2fsprogs

      # Enable and start Docker
      systemctl enable docker
      systemctl start docker

      # Add the Lima user to docker and kvm groups
      # Lima maps the host user; find them from /etc/passwd (non-system, non-nobody)
      LIMA_USER=$(awk -F: '$3 >= 500 && $1 != "nobody" { print $1; exit }' /etc/passwd)
      if [ -n "$LIMA_USER" ]; then
        usermod -aG docker "$LIMA_USER"
        usermod -aG kvm "$LIMA_USER"
      fi

  # Install Rust toolchain as the user (not root)
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail
      if ! command -v rustup &>/dev/null; then
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        source "$HOME/.cargo/env"
        rustup target add aarch64-unknown-linux-musl
        # Ensure cargo is on PATH for future shells
        echo '. "$HOME/.cargo/env"' >> "$HOME/.bashrc"
      fi

portForwards:
  # Forward Firecracker API socket access (if needed from host)
  - guestSocket: "/tmp/firecracker.sock"
    hostSocket: "/tmp/fc-lima.sock"

message: |
  Lima VM ready for Firecracker development.

  Quick start:
    limactl shell fc
    firecracker --version
    ls /dev/kvm

  Build everything:
    cd /harness/firecracker
    make all

  The project is mounted at /harness.
